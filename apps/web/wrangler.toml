# Cloudflare Pages configuration for the getpdfpro-web app.
#
# The build process (run by `pnpm pages:build`):
#   1. `opennextjs-cloudflare build` runs `next build` and produces
#      a Cloudflare Worker at `.open-next/worker.js` plus a static
#      assets directory at `.open-next/` (or `.open-next/assets/`).
#   2. Our `pages:build` script then renames `worker.js` to `_worker.js`
#      (the Cloudflare Pages convention) and copies our `_headers` +
#      `_redirects` files into the build output.
#   3. Cloudflare Pages deploys from `.open-next/` directly: it picks
#      up `_worker.js` as the request handler and serves the rest as
#      static assets.
#
# Env vars are set in the Cloudflare dashboard (Pages -> project ->
# Settings -> Environment variables), NOT in this file. Secrets go
# there too.
#
# See: https://opennext.js.org/cloudflare
#      https://developers.cloudflare.com/pages/functions/functions-as-workers

name = "getpdfpro-web"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages reads `pages_build_output_dir` to know which
# directory to upload. The dashboard ALSO has a "Build output
# directory" setting, and they must agree. We keep both set to
# `.open-next` so the deploy reads our renamed worker + assets.
pages_build_output_dir = ".open-next"

# Disable observability (we'll add Logflare/Datadog later if needed).
[observability]
enabled = false
