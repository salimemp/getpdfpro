name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'getpdfpro/docs/**'
      - 'mkdocs.yml'
      - 'docs/css/**'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-revision-date plugin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify (optional)
        if: success()
        run: |
          echo "Docs deployed to ${{ steps.deployment.outputs.page_url }}"
          echo "Set up custom domain docs.getpdfpro.com:"
          echo "1. Create CNAME file in the deployed site"
          echo "2. Point docs.getpdfpro.com CNAME to salimemp.github.io"
