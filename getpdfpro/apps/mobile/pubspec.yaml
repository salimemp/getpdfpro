name: getpdfpro_mobile
description: Cross-platform PDF app — iOS, Android, Web, macOS, Windows, Linux
publish_to: 'none'
version: 0.1.0+1

environment:
  # Bumped from sdk>=3.4 / flutter>=3.24 to satisfy
  # syncfusion_flutter_pdf 33.x (which requires Dart ^3.7
  # AND Flutter >=3.35.1). Flutter 3.35+ ships Dart 3.7+
  # and satisfies the Flutter floor.
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.35.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Routing
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Auth
  supabase_flutter: ^2.8.0
  webauthn: ^0.2.5          # Passkey / WebAuthn
  local_auth: ^2.3.0         # Biometrics

  # QR rendering for TOTP enrollment (authenticator app scans the
  # otpauth:// URI). qr_flutter 4.1.0 is the Flutter 3.24+/Dart 3.7+
  # compatible line.
  qr_flutter: ^4.1.0

  # Crypto helpers used by the passkey enrollment flow to derive a
  # deterministic 32-byte clientDataHash from a server-side challenge
  # (we don't have a real WebAuthn server yet — the hash is a SHA-256
  # of the challenge bytes; this is the same digest the `webauthn`
  # package would receive from a relying-party server).
  crypto: ^3.0.5

  # RFC 4648 base32 encoding for the raw TOTP secret (so users who
  # can't scan the QR can still paste it into Google Authenticator,
  # 1Password, Bitwarden, etc.).
  base32: ^2.1.3

  # PDF
  syncfusion_flutter_pdf: ^33.2.12
  pdfx: ^2.6.0
  printing: ^5.13.4

  # i18n
  easy_localization: ^3.0.7
  intl: ^0.20.2

  # Voice / TTS
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Deep links — handles incoming `getpdfpro://...` and
  # `https://app.getpdfpro.com/...` links (OAuth callbacks, password
  # reset, magic-link landing). 6.x supports Flutter 3.24+ and
  # Android 11+ package visibility rules out of the box.
  app_links: ^6.3.2

  # External URL launcher — the placeholder tool pages
  # (ToolPlaceholderPage) and the Settings "Open on web" link
  # need to call launchUrl() to hand the user off to
  # https://app.getpdfpro.com/tools/<slug>. 6.x is the
  # Flutter 3.24+ compatible line; 7.x requires Flutter 3.27+.
  url_launcher: ^6.3.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # File picker — system file dialog for picking PDFs (and other files
  # the user wants to convert). The latest 8.x line is the only one
  # that's compatible with Flutter 3.24+. 9.x requires Flutter 3.27+.
  file_picker: ^8.1.4

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  retrofit_generator: ^9.1.4

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
  generate: true
