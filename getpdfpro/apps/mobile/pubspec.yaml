name: getpdfpro_mobile
description: Cross-platform PDF app — iOS, Android, Web, macOS, Windows, Linux
publish_to: 'none'
version: 0.1.0+1

environment:
  # Bumped from sdk>=3.4 / flutter>=3.24 to satisfy
  # syncfusion_flutter_pdf 33.x (which requires Dart ^3.7).
  # Flutter 3.27+ ships Dart 3.7.
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Routing
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Auth
  supabase_flutter: ^2.8.0
  webauthn: ^0.2.5          # Passkey / WebAuthn
  local_auth: ^2.3.0         # Biometrics

  # PDF
  syncfusion_flutter_pdf: ^33.2.12
  pdfx: ^2.6.0
  printing: ^5.13.4

  # i18n
  easy_localization: ^3.0.7
  intl: ^0.20.2

  # Voice / TTS
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Deep links — handles incoming `getpdfpro://...` and
  # `https://app.getpdfpro.com/...` links (OAuth callbacks, password
  # reset, magic-link landing). 6.x supports Flutter 3.24+ and
  # Android 11+ package visibility rules out of the box.
  app_links: ^6.3.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # File picker — system file dialog for picking PDFs (and other files
  # the user wants to convert). The latest 8.x line is the only one
  # that's compatible with Flutter 3.24+. 9.x requires Flutter 3.27+.
  file_picker: ^8.1.4

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  retrofit_generator: ^9.1.4

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
  generate: true
