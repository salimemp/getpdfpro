# Local WordPress development stack
#
# Brings up WordPress + MariaDB on localhost for theme/plugin dev
# Production uses Hostinger (see docs/WORDPRESS-SETUP.md)
#
# Usage:
#   docker compose -f infra/wordpress/docker-compose.yml up -d
#   open http://localhost:8080
#
# Stop:
#   docker compose -f infra/wordpress/docker-compose.yml down

services:
  wordpress:
    image: wordpress:6-php8.3-apache
    container_name: getpdfpro_wp
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8080');
        define('WP_SITEURL', 'http://localhost:8080');
        define('DISALLOW_FILE_EDIT', true);
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-config.php:/var/www/html/wp-config.php:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mariadb:11
    container_name: getpdfpro_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_RANDOM_ROOT_PASSWORD: 1
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  wpcli:
    # WP-CLI for automation (run commands: docker compose run --rm wpcli wp ...)
    image: wordpress:cli-php8.3
    container_name: getpdfpro_wpcli
    profiles: ["cli"]
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - db
    entrypoint: wp

volumes:
  wordpress_data:
  db_data:
