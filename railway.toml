# =============================================================================
# Railway service definition for the GetPDFPro API
# =============================================================================
# This file is the source of truth for the deploy contract on Railway.
# The dashboard "Custom Start Command" field is OVERRIDDEN by this file
# when present. We use a start.sh script (not a one-liner) because the
# script is exec'd through /bin/sh which expands $PORT — if we put
# $PORT directly in startCommand here, Railway exec's it literally and
# uvicorn dies with "Invalid value for '--port': '$PORT'".
#
# For the Redis service, add it manually in the Railway dashboard:
#   "+ New" → "Database" → "Redis"
# Railway will then inject REDIS_URL into both services automatically.
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile.api"

[deploy]
# Use the start.sh script (in the image at /usr/local/bin/start.sh).
# It handles $PORT expansion via /bin/sh before exec'ing uvicorn.
startCommand = "/usr/local/bin/start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Worker (Celery) — same image, different Dockerfile + CMD.
# Created from the dashboard: "+ New" → "GitHub Repo" → same repo →
# "Dockerfile Path" = apps/api/Dockerfile.worker.
# (Railway doesn't read worker definitions from this toml file directly
# when the api service is already declared — see runbook.)
