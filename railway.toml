# =============================================================================
# Railway service definition for the GetPDFPro API
# =============================================================================
# Drop this file at the REPO ROOT. Railway will pick it up the first time
# the repo is added to a project; it pre-creates the api + worker services
# so you don't have to click "Add Service" twice in the dashboard.
#
# For the Redis service, add it manually in the Railway dashboard:
#   "+ New" → "Database" → "Redis"
# Railway will then inject REDIS_URL into both services automatically.
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile.api"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Per-service source path tells Railway "this is a multi-service repo,
# only the apps/api subtree belongs to this service."
[[services]]
source = "apps/api"

# Worker (Celery) — same image, different Dockerfile + CMD.
# Created from the dashboard: "+ New" → "GitHub Repo" → same repo →
# "Dockerfile Path" = apps/api/Dockerfile.worker.
# (Railway doesn't read worker definitions from this toml file directly
# when the api service is already declared — see runbook.)
